name: Release Docker Images

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: false

env:
  BACKEND_IMAGE: jeanphilo/tsingai-lens-backend
  FRONTEND_IMAGE: jeanphilo/tsingai-lens-frontend

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare release variables
        id: vars
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "publish_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish_latest=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata for backend
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.version }}
            type=raw,value=latest,enable=${{ steps.vars.outputs.publish_latest == 'true' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          build-args: |
            APT_MIRROR=http://deb.debian.org
            PIP_INDEX_URL=https://pypi.org/simple

      - name: Docker metadata for frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.version }}
            type=raw,value=latest,enable=${{ steps.vars.outputs.publish_latest == 'true' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          build-args: |
            PUBLIC_API_BASE_URL=same-origin
