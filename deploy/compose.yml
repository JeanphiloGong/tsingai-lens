services:
  backend:
    image: ${LENS_BACKEND_IMAGE:-jeanphilo/tsingai-lens-backend}:${LENS_VERSION:?Set LENS_VERSION in .env}
    env_file:
      - ./backend.env
    volumes:
      - ./data/backend:/app/data:Z
    expose:
      - "8010"
    restart: unless-stopped

  frontend:
    image: ${LENS_FRONTEND_IMAGE:-jeanphilo/tsingai-lens-frontend}:${LENS_VERSION:?Set LENS_VERSION in .env}
    ports:
      - "${LENS_HTTP_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped
